server:
  port: 8081

# ── DataSource ────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fireworks_neighborhood?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

# ── MyBatis-Plus ──────────────────────────────────────────────────────────────
mybatis-plus:
  # Scan mapper XML files from all JARs on the classpath (including fireworks-service)
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  # Signing key — replace with a strong random string (64+ chars) in production
  secret: fireworks-neighborhood-jwt-secret-key-please-change-in-production
  # Token expiration in seconds (default: 86400 = 24 hours)
  expiration: 86400
  # Request header that carries the token
  tokenHeader: Authorization
  # Token prefix (note the trailing space)
  tokenHead: "Bearer "
