server:
  port: 8081

# 日志配置
logging:
  level:
    com.fireworks: debug
    org.springframework.security: debug
    com.baomidou.mybatisplus: debug
    org.springframework.security.web.access: TRACE

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/fireworks_neighborhood?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  redis:
    host: 127.0.0.1
    port: 6379

# RocketMQ 配置
# admin 模块本身不发送购物车 MQ 消息，但 scanBasePackages 扫描到了 CartMqProducer，
# RocketMQAutoConfiguration#defaultMQProducer 需要 rocketmq.producer.group 才能创建 RocketMQTemplate Bean。
# 使用独立的 group 名避免与 api 模块冲突。
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: cart-producer-group-admin
    send-message-timeout: 3000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

file:
  upload-dir: D:/fireworks-neighborhood-file

jwt:
  secret: fireworks-neighborhood-jwt-secret-key-please-change-in-production
  expiration: 86400
  tokenHeader: Authorization
  tokenHead: "Bearer "
