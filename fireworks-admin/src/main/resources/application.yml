server:
  port: 8081

# ── 日志配置 ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.fireworks: debug
    org.springframework.security: debug
    com.baomidou.mybatisplus: debug
    org.springframework.security.web.access: TRACE



# ── 数据源配置 ────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fireworks_neighborhood?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Flyway 数据库迁移配置
  flyway:
    enabled: false
    baseline-on-migrate: true   # 已有库且无 Flyway 历史表时，自动建立基线后执行迁移
    baseline-version: 0         # 基线版本，便于 V1 等迁移在首次接入时正常执行
    locations: classpath:db/migration
  redis:
    host: 127.0.0.1
    port: 6379

# ── MyBatis-Plus 配置 ─────────────────────────────────────────────────────────
mybatis-plus:
  # 扫描所有 JAR 包（含 fireworks-service 模块）classpath 下的 mapper XML 文件
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    # 开启驼峰命名与下划线字段的自动映射
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键策略：数据库自增
      id-type: auto

# ── 文件上传存储路径 ───────────────────────────────────────────────────────────
file:
  upload-dir: D:/fireworks -neighborhood-file   # 主图、视频、详情图根目录

# ── JWT 配置 ──────────────────────────────────────────────────────────────────
jwt:
  # 签名密钥，生产环境请替换为 64 位以上的强随机字符串，勿硬编码提交到代码仓库
  secret: fireworks-neighborhood-jwt-secret-key-please-change-in-production
  # Token 有效期（单位：秒），默认 86400 = 24 小时
  expiration: 86400
  # 存放 Token 的请求头名称
  tokenHeader: Authorization
  # Token 前缀（注意末尾保留一个空格）
  tokenHead: "Bearer "
